<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Vision | The Collection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Custom Cursor -->
  <div class="cursor-dot" id="cursor-dot"></div>
  <div class="cursor-ring" id="cursor-ring"></div>

  <!-- Ambient Background -->
  <div class="ambient-bg">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>
  </div>

  <!-- Floating Nav -->
  <nav class="dynamic-island">
    <div class="nav-content">
      <span class="logo">Vision</span>
      
      <!-- View Toggle -->
      <div class="view-toggle">
        <button class="view-btn active" data-view="gallery">Gallery</button>
        <button class="view-btn" data-view="people">People</button>
        <button class="view-btn" data-view="starmap">Star Map</button>
      </div>

      <!-- Category Pills (only visible in Gallery view) -->
      <div class="category-filters" id="category-filters">
        <button class="cat-pill active" data-cat="All">All</button>
        <button class="cat-pill" data-cat="Portrait">Portrait</button>
        <button class="cat-pill" data-cat="Lifestyle">Lifestyle</button>
        <button class="cat-pill" data-cat="Creative">Creative</button>
      </div>

      <div class="nav-actions">
        <button class="icon-btn" id="btn-director" title="Director Mode">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
        </button>
        <button class="icon-btn" id="btn-search" title="Search (Cmd+K)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <button class="magnetic-btn" id="btn-upload">
          <span class="btn-text">Add Portrait</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <header class="hero" id="hero">
    <div class="hero-content">
      <h1 class="hero-title">
        <span class="reveal-text">Faces of</span><br>
        <span class="reveal-text text-gradient">Innovation.</span>
      </h1>
      <p class="hero-subtitle">A spatial gallery. Immerse yourself in the extraordinary.</p>
      
      <div class="scroll-indicator">
        <div class="mouse">
          <div class="wheel"></div>
        </div>
      </div>
    </div>
  </header>

  <!-- Editorial Gallery -->
  <main class="gallery-wrapper" id="view-gallery">
    <div class="masonry-grid" id="gallery-grid">
      <!-- Cards injected by JS -->
      <div class="empty-state" id="empty-state" style="display:none;">
        <p>The canvas is blank. Upload a portrait.</p>
      </div>
    </div>
  </main>

  <!-- People View -->
  <main class="people-wrapper" id="view-people" style="display: none;">
    <div class="people-grid" id="people-grid">
      <!-- People circles injected by JS -->
    </div>
    
    <div class="person-detail-view" id="person-detail-view" style="display: none;">
      <div class="person-header">
        <button class="icon-btn" id="btn-back-people">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <h2 id="person-title">Person Name</h2>
      </div>
      <div class="masonry-grid" id="person-gallery-grid">
        <!-- Person's photos injected by JS -->
      </div>
    </div>
  </main>

  <!-- Star Map View -->
  <main class="starmap-wrapper" id="view-starmap" style="display: none;">
    <div id="starmap-container">
      <canvas id="starmap-canvas"></canvas>
      <div class="starmap-ui">
        <div class="starmap-legend">
          <span><span class="dot p-dot"></span>Person</span>
          <span><span class="dot c-dot"></span>Category</span>
        </div>
      </div>
    </div>
  </main>

  <!-- Spatial Upload Modal -->
  <div class="spatial-modal-overlay" id="upload-overlay">
    <div class="spatial-modal" id="upload-modal">
      <button class="modal-close" id="upload-close">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      
      <div class="modal-header">
        <h2>Drop to Add</h2>
        <p>Supports JPG, PNG, WebP up to 20MB.</p>
      </div>

      <div class="upload-dropzone" id="dropzone">
        <input type="file" id="file-input" hidden multiple accept="image/*">
        <div class="drop-content" id="drop-content">
          <div class="upload-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </div>
          <p>Drag files here or <span>browse</span></p>
        </div>
        <div class="upload-preview" id="upload-preview"></div>
      </div>

      <div class="upload-meta" id="upload-meta" style="display: none;">
        <!-- Injected per-file forms by JS -->
        <div id="upload-batch-list"></div>
      </div>

      <div class="upload-actions" id="upload-actions" style="display: none;">
        <button class="glass-btn primary" id="btn-submit">Upload to Collection</button>
      </div>

      <div class="upload-progress" id="upload-progress" style="display: none;">
        <div class="progress-track"><div class="progress-bar" id="progress-bar"></div></div>
        <span class="progress-text" id="progress-text">Uploading...</span>
      </div>
    </div>
  </div>

  <!-- Cinematic Lightbox -->
  <div class="cinematic-lightbox" id="lightbox">
    <div class="lb-glass-bg"></div>
    
    <div class="lb-toolbar">
      <div class="lb-caption" id="lb-caption"></div>
      <div class="lb-tools">
        <!-- Reactions -->
        <div class="lb-reactions">
          <button class="reaction-btn" data-emoji="❤️" title="Hotkey: 1">❤️</button>
          <button class="reaction-btn" data-emoji="🔥" title="Hotkey: 2">🔥</button>
          <button class="reaction-btn" data-emoji="✨" title="Hotkey: 3">✨</button>
          <button class="reaction-btn" data-emoji="😂" title="Hotkey: 4">😂</button>
        </div>

        <button class="lb-action" id="lb-like" title="Like (L)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
        <button class="lb-action" id="lb-info" title="Info (I)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        </button>
        <button class="lb-action" id="lb-play" title="Auto Play (Space)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
        </button>
        <button class="lb-action danger" id="lb-delete">Delete</button>
        <button class="lb-action" id="lb-close">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>

    <button class="lb-nav prev" id="lb-prev">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="lb-nav next" id="lb-next">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="9 6 15 12 9 18"/></svg>
    </button>

    <div class="lb-image-container" id="lb-image-container">
      <img id="lb-img" src="" alt="">
    </div>

    <!-- Filmstrip -->
    <div class="lb-filmstrip" id="lb-filmstrip">
      <div class="filmstrip-track" id="filmstrip-track"></div>
    </div>

    <!-- Detail Drawer -->
    <div class="lb-detail-drawer" id="lb-detail-drawer">
      <div class="drawer-header">
        <h3>Metadata & Edit</h3>
        <button class="icon-btn" id="drawer-close"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="drawer-body">
        <label>Caption</label>
        <input type="text" class="glass-input" id="edit-caption">
        <label>Category</label>
        <select class="glass-select" id="edit-category">
          <option value="Portrait">Portrait</option>
          <option value="Lifestyle">Lifestyle</option>
          <option value="Creative">Creative</option>
        </select>
        <label>Person</label>
        <input type="text" class="glass-input" id="edit-person">
        <label>Tags / Emotion</label>
        <input type="text" class="glass-input" id="edit-emotion">
        <label>State</label>
        <select class="glass-select" id="edit-state">
          <option value="published">Published</option>
          <option value="draft">Draft</option>
          <option value="featured">Featured</option>
          <option value="archived">Archived</option>
        </select>
        <div style="margin-top: 1rem;">
          <label><input type="checkbox" id="edit-favorite"> Favorite</label>
        </div>
      </div>
    </div>
  </div>

  <!-- Command Palette (Search) -->
  <div class="palette-overlay" id="palette-overlay">
    <div class="command-palette">
      <div class="palette-search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="palette-input" placeholder="Search title, person, tag, emoji... (Esc)" autocomplete="off">
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
